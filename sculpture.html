<style>

  nav {
    display: flex; justify-content: space-between; align-items: center;
    padding: 18px 52px; position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(8,6,8,0.82); backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(232,224,212,0.06);

  .hero {
    min-height: 88vh; display: flex; flex-direction: column; justify-content: flex-end;
    padding: 0 52px 56px; border-bottom: 1px solid rgba(232,224,212,0.08);
    position: relative; overflow: hidden;
    background-image: url('assets/img/w89g2g-black4.jpg');
    background-size: cover; background-position: center 30%;
  }
  .hero::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(8,6,8,0.5) 0%, rgba(8,6,8,0.25) 45%, rgba(8,6,8,0.85) 100%);

  .hero > * { position: relative; z-index: 2; }
  .hero h1 {
    font-family: 'Anton', sans-serif; font-weight: 400;
    font-size: clamp(52px, 7vw, 130px); line-height: 0.92; letter-spacing: 0.01em;
    text-transform: uppercase; color: #e8e0d4;
  }
  .hero h1 .accent { color: #e2007a; }
  .hero-meta { margin-top: 48px; border-top: 1px solid rgba(232,224,212,0.12); }
  .hero-meta p { padding: 26px 48px 0 0; font-family: 'Lora', serif; font-size: 16px; line-height: 1.75; color: rgba(232,224,212,0.65); max-width: 560px; }
  .section { padding: 80px 52px; border-bottom: 1px solid rgba(232,224,212,0.06); }
  .section-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #e2007a; margin-bottom: 36px; }
  .section h2 {
    font-family: 'Anton', sans-serif; font-weight: 400;
    font-size: clamp(28px, 3.5vw, 56px); letter-spacing: 0.01em; text-transform: uppercase;
    line-height: 1.02; color: #e8e0d4; margin-bottom: 36px;
  }
  .work-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
  .work-tile {
    position: relative; cursor: pointer; overflow: hidden;
    border: 1px solid rgba(232,224,212,0.08); background: rgba(232,224,212,0.03);

  .work-tile:hover { border-color: #e2007a; }
  .work-tile img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; }
  .work-tile:hover img { transform: scale(1.03); }
  .work-tile::after { content:''; position:absolute; left:0; right:0; bottom:0; height:45%; background:linear-gradient(to top, rgba(8,6,8,0.8), transparent); z-index:1; }
  .tile-meta { position: relative; z-index: 2; }
  .tile-num { font-size: 10px; letter-spacing: 0.12em; color: rgba(232,224,212,0.45); margin-bottom: 4px; }
  .tile-name { font-size: 19px; font-weight: 500; color: #f5f0e8; line-height: 1.2; font-family: 'Lora', serif; }
  .about-grid { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 80px; align-items: start; }
  .about-grid p { font-family: 'Lora', serif; font-size: 17px; line-height: 1.88; color: rgba(232,224,212,0.5); margin-bottom: 20px; }
  .about-grid p em { color: rgba(232,224,212,0.8); font-style: italic; }
  .instr-cards { display: flex; flex-direction: column; gap: 2px; }

  .instr-num { font-size: 10px; letter-spacing: 0.15em; color: #e2007a; margin-bottom: 10px; }
  .instr-title { font-size: 16px; font-weight: 500; color: #e8e0d4; margin-bottom: 8px; }
  .instr-body { font-family: 'Lora', serif; font-size: 14px; line-height: 1.65; color: rgba(232,224,212,0.38); }
  .vinyl-strip { padding: 52px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(232,224,212,0.06); gap: 40px; }
  .vinyl-strip .vs-label { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: #e2007a; margin-bottom: 12px; }
  .vinyl-strip h3 { font-family: 'Anton', sans-serif; font-weight: 400; font-size: clamp(24px, 2.5vw, 40px); text-transform: uppercase; letter-spacing: 0.01em; color: #e8e0d4; margin-bottom: 8px; }
  .vinyl-strip p { font-family: 'Lora', serif; font-size: 15px; color: rgba(232,224,212,0.4); }
  .hz-btn {
    padding: 16px 36px; background: #e2007a; color: #fff;
    font-size: 12px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
    transition: opacity 0.2s; white-space: nowrap; border-radius: 2px; flex-shrink: 0;
    font-family: 'JetBrains Mono', monospace;
  }
  .hz-btn:hover { opacity: 0.82; }
  .hz-btn.outline { background: transparent; border: 1px solid rgba(232,224,212,0.18); color: rgba(232,224,212,0.6); }
  .hz-btn.outline:hover { border-color: #e2007a; color: #e2007a; opacity: 1; }
  .cta-strip { padding: 80px 52px; display: flex; justify-content: space-between; align-items: center; gap: 40px; border-bottom: 1px solid rgba(232,224,212,0.06); }
  .cta-strip h2 { font-family: 'Anton', sans-serif; font-weight: 400; font-size: clamp(28px, 3.2vw, 52px); letter-spacing: 0.01em; text-transform: uppercase; line-height: 1.02; color: #e8e0d4; }
  .cta-strip h2 span { color: #e2007a; }
  footer { padding: 28px 52px; display: flex; justify-content: space-between; align-items: center; font-size: 10px; letter-spacing: 0.1em; color: rgba(232,224,212,0.25); }
  footer a { color: inherit; transition: color 0.15s; }
  footer a:hover { color: #e2007a; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  .fade-in { animation: fadeUp 0.6s ease both; }
  .lb-backdrop { position: fixed; inset: 0; z-index: 200; background: rgba(8,6,8,0.97); overflow-y: auto; animation: fadeUp 0.3s ease both; }
  .lb-inner { max-width: 880px; margin: 0 auto; padding: 90px 32px 120px; }
  .lb-close {
    position: fixed; top: 20px; right: 28px; z-index: 210;

    cursor: pointer; font-family: 'JetBrains Mono', monospace; transition: all 0.15s;
  }
  .lb-close:hover { border-color: #e2007a; color: #e2007a; }
  .lb-cat { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #e2007a; margin-bottom: 14px; }
  .lb-title { font-family: 'Anton', sans-serif; font-weight: 400; font-size: clamp(38px, 5vw, 72px); line-height: 0.96; letter-spacing: 0.01em; text-transform: uppercase; color: #e8e0d4; margin-bottom: 30px; }
  .lb-text { font-family: 'Lora', serif; font-size: 16px; line-height: 1.75; color: rgba(232,224,212,0.62); margin-bottom: 18px; white-space: pre-line; }
  .lb-imgs { display: flex; flex-direction: column; gap: 14px; margin-top: 38px; }
  .lb-imgs img { width: 100%; display: block; border: 1px solid rgba(232,224,212,0.08); }

<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

// ── PIECES — slug opens the lightbox with the piece's full story ──
const PIECES = [
  { id:'01', name:'Night Mission',   src:'assets/img/qjwq39-blackport.jpg', slug:'nightmission' },
  { id:'02', name:'Barley Tusk',     src:'assets/img/jcrk86-barleyport.jpg', slug:'barleytusk' },
  { id:'03', name:'A-Frame',         src:'assets/img/9sjzb0-aframeport.jpg' },
  { id:'04', name:'Water Totem',     src:'assets/img/9o0b9w-hollyport.jpg', slug:'water-totem' },
  { id:'05', name:'Sun Salutation',  src:'assets/img/u0qvf2-sunport.jpg', slug:'sunsalutation' },
  { id:'06', name:'Water Totem II',  src:'assets/img/hu1sct-peachport.jpg', slug:'water-totem-2' },
  { id:'07', name:'Water Totem III', src:'assets/img/axf460-redport.jpg', slug:'water-totem-3' },
  { id:'08', name:'Water Type',      src:'assets/img/f0tyqm-wtport.jpg', slug:'watertype' },
  { id:'09', name:'Water Block',     src:'assets/img/qd91de-blockport.jpg', slug:'water-block' },
  { id:'10', name:'Black Crescent',  src:'assets/img/nn4lzk-crescentport.jpg', slug:'blackcrescent' },
  { id:'11', name:'Barley Twist',    src:'assets/img/6gyc7q-barleytwistport.jpg', slug:'barleytwist' },
  { id:'12', name:'Broken Vessel',   src:'assets/img/ppercg-brokenport.jpg', slug:'broken-vessel' },
];

function Lightbox({ piece, onClose }) {
  useEffect(() => {
    const onKey = e => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    document.body.style.overflow = 'hidden';
    return () => { window.removeEventListener('keydown', onKey); document.body.style.overflow = ''; };
  }, []);
  const detail = piece.slug ? window.SCULPTURE_DETAILS[piece.slug] : null;
  return ReactDOM.createPortal(
    <div className="lb-backdrop" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <button className="lb-close" onClick={onClose} aria-label="Close">✕</button>
      <div className="lb-inner">
        <div className="lb-cat">Sculpture · {piece.id}</div>
        <div className="lb-title">{piece.name}</div>
        {detail && detail.text.map((t, i) => <p className="lb-text" key={i}>{t}</p>)}
        <div className="lb-imgs">
          {(detail && detail.images.length ? detail.images : [piece.src]).map((src, i) => <img src={src} key={i} loading="lazy" alt="" />)}
        </div>
      </div>
    </div>,
    document.body
  );
}

function App() {
  const [open, setOpen] = useState(null);
  return (
    <div className="fade-in">
      <section className="hero">
        {/* ── HEADLINE — edit below ── */}
        <h1>First you have to<br/>ask the wood<br/><span className="accent">what it wants to be</span></h1>
        <div className="hero-meta">
          <p>I primarily use salvaged wood destined for chippers and burn piles. With a few basic tools — a chainsaw, an angle grinder, a Dremel — I create works that represent ideas imbued upon the natural forms of the wood.</p>
        </div>
      </section>

      <section className="section">
        <div className="section-label">Selected pieces</div>
        <h2>Twelve pieces, twelve second chances</h2>
        <div className="work-grid">
          {PIECES.map(p => (
            <div key={p.id} className="work-tile" onClick={() => setOpen(p)} role="button" tabIndex={0} onKeyDown={e => { if (e.key === 'Enter') setOpen(p); }}>
              <img src={p.src} alt={p.name} loading="lazy" />
              <div className="tile-meta">
                <div className="tile-num">{p.id}</div>
                <div className="tile-name">{p.name}</div>
              </div>
            </div>
          ))}
        </div>
      </section>

      <section className="section" id="about">
        <div className="section-label">About the work</div>
        <div className="about-grid">
          <div>
            <h2>Each piece is<br/>a self-portrait</h2>
            {/* ── ARTIST STATEMENT — edit below ── */}
            <p>All of this work is, in a conceptual sense, a self-portrait. It starts with wood pulled from the trash — discarded, overlooked. Through no merit of its own, it gets chosen.</p>
            <p>Then it is made into something new. Given a purpose it did not have before. A new identity. And then it is <em>set apart</em> as something with honor — something that belongs, something worth keeping.</p>
            <p style={{fontFamily:"'JetBrains Mono', monospace", fontSize:13, color:'rgba(232,224,212,0.28)', letterSpacing:'0.04em'}}>Wes Webb · 20+ years in wood · Nashville, TN</p>
          </div>
          <div className="instr-cards">
            {[
              { num:'01', title:'Salvaged material.', body:'Every piece starts with found or reclaimed wood — pulled from the trash, overlooked, chosen. Nothing harvested for the sake of it.' },
              { num:'02', title:'Hand-worked, start to finish.', body:'Cut, shaped, and finished by hand. No CNC, no shortcuts. The grain decides as much as the maker does.' },
              { num:'03', title:'One of one.', body:'Each piece is unique and unrepeatable. A new identity given to something that had none. When it is sold, it is gone.' },
            ].map(({num, title, body}) => (
              <div key={num} className="instr-card">
                <div className="instr-num">{num}</div>
                <div className="instr-title">{title}</div>
                <div className="instr-body">{body}</div>
              </div>
            ))}
          </div>
        </div>
      </section>

      <div className="vinyl-strip">
        <div>
          <div className="vs-label">Available through</div>
          <h3>The Copper Fox Gallery</h3>
          <p>Selected pieces available for purchase. Bowls, jars, and platters in the shop.</p>
        </div>
        <a href="#" className="hz-btn">Visit gallery ↗</a>
      </div>

      <div className="cta-strip">
        <h2>Made by the same hands<br/>that <span>build brands</span><br/>and make sound</h2>
        <div style={{display:'flex', gap:12, flexDirection:'column', alignItems:'flex-end', flexShrink:0}}>
          <a href="work.html" className="hz-btn">See design work →</a>
          <a href="music.html" className="hz-btn outline">Hear the music →</a>
        </div>
      </div>

      <footer>
        <span>© 2026 WES WEBB · IAMWESWEBB.COM</span>
        <span><a href="https://www.instagram.com/iamweswebb/" target="_blank" rel="noreferrer">INSTAGRAM</a> · <a href="mailto:wes@iamweswebb.com">EMAIL</a> · NASHVILLE, TN</span>
      </footer>

      {open && <Lightbox piece={open} onClose={() => setOpen(null)} />}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
