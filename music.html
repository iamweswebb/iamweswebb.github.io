<script>
// ── AMBIENT CANVAS ────────────────────────────────────────
(function() {
  const canvas = document.getElementById('ambient-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [], t = 0;

  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }

  function initParticles() {
    particles = Array.from({length: 50}, () => ({
      x: Math.random() * (typeof W !== 'undefined' ? W : 1440),
      y: Math.random() * (typeof H !== 'undefined' ? H : 900),
      r: 1 + Math.random() * 2.5,
      vx: (Math.random() - 0.5) * 0.1,
      vy: (Math.random() - 0.5) * 0.07,
      alpha: 0.025 + Math.random() * 0.065,
      pink: Math.random() > 0.6,
    }));
  }

  function drawWave(y, amp, freq, phase, alpha, rgb) {
    ctx.beginPath();
    ctx.strokeStyle = `rgba(${rgb},${alpha})`;
    ctx.lineWidth = 0.7;
    for (let x = 0; x <= W; x += 2) {
      const ny = y + Math.sin(x * freq + phase) * amp + Math.sin(x * freq * 0.4 + phase * 1.2) * amp * 0.35;
      x === 0 ? ctx.moveTo(x, ny) : ctx.lineTo(x, ny);
    }
    ctx.stroke();
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    const g = ctx.createRadialGradient(W*0.25, H*0.35, 0, W*0.25, H*0.35, W*0.55);
    g.addColorStop(0, 'rgba(226,0,122,0.05)'); g.addColorStop(1, 'transparent');
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
    const g2 = ctx.createRadialGradient(W*0.8, H*0.7, 0, W*0.8, H*0.7, W*0.4);
    g2.addColorStop(0, 'rgba(245,166,35,0.03)'); g2.addColorStop(1, 'transparent');
    ctx.fillStyle = g2; ctx.fillRect(0, 0, W, H);

    [
      { y: H*0.2, amp: 35, freq: 0.0025, phase: t*0.00035, alpha: 0.055, rgb:'226,0,122' },
      { y: H*0.42, amp: 55, freq: 0.0018, phase: t*0.00028+1, alpha: 0.035, rgb:'226,0,122' },
      { y: H*0.62, amp: 42, freq: 0.0022, phase: t*0.00032+2, alpha: 0.045, rgb:'245,166,35' },
      { y: H*0.82, amp: 28, freq: 0.003, phase: t*0.00042+0.5, alpha: 0.03, rgb:'226,0,122' },
    ].forEach(w => drawWave(w.y, w.amp, w.freq, w.phase, w.alpha, w.rgb));

    particles.forEach(p => {
      p.x += p.vx + Math.sin(t*0.0003 + p.y*0.01) * 0.04;
      p.y += p.vy + Math.cos(t*0.0002 + p.x*0.01) * 0.035;
      if (p.x < -10) p.x = W+10; if (p.x > W+10) p.x = -10;
      if (p.y < -10) p.y = H+10; if (p.y > H+10) p.y = -10;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = p.pink ? `rgba(226,0,122,${p.alpha})` : `rgba(245,166,35,${p.alpha})`;
      ctx.fill();
    });
    t++; requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  resize(); initParticles(); draw();
})();
</script>

function AnimatedWaveform() {
  const [bars, setBars] = useState(() =>
    Array.from({length: 72}, (_, i) => Math.max(6, Math.min(90,
      18 + Math.sin(i*0.55)*22 + Math.sin(i*0.22)*14
    )))
  );
  useEffect(() => {
    const iv = setInterval(() => {
      setBars(prev => prev.map((h, i) => {
        const base = 18 + Math.sin(i*0.55 + Date.now()*0.0008)*20 + Math.sin(i*0.22)*12;
        return Math.max(5, Math.min(92, base + (Math.random()-0.5)*10));
      }));

    return () => clearInterval(iv);
  }, []);
  return (
    <div className="waveform-row">
      {bars.map((h, i) => (
        <div key={i} className="wbar" style={{
          flex:1, height:`${h}%`,
          background: i % 9 === 0
            ? '#e2007a'
            : `rgba(232,224,212,${0.05 + h/280})`,
        }} />

  );

    const onMeta = () => {

      if (isFinite(a.duration) && a.duration>0) { setDur(a.duration); if (a.currentTime>a.duration) a.currentTime = (saved>0 && saved<a.duration-2) ? saved : 0; }
    };
    const onTime = () => { if (isFinite(a.duration) && a.currentTime<=a.duration) { setT(a.currentTime); localStorage.setItem('hz-remix-pos', String(a.currentTime)); } };
    const onEnd = () => { setPlaying(false); localStorage.setItem('hz-remix-pos','0'); };
    const onPlay = () => setPlaying(true);
    const onPause = () => setPlaying(false);
    a.addEventListener('loadedmetadata', onMeta); a.addEventListener('durationchange', onDur); a.addEventListener('timeupdate', onTime); a.addEventListener('ended', onEnd); a.addEventListener('play', onPlay); a.addEventListener('pause', onPause);
    return () => { a.removeEventListener('loadedmetadata', onMeta); a.removeEventListener('durationchange', onDur); a.removeEventListener('timeupdate', onTime); a.removeEventListener('ended', onEnd); a.removeEventListener('play', onPlay); a.removeEventListener('pause', onPause); };
  }, []);
  useEffect(() => {
    if (!playing) return;
    if (!ctxRef.current) {
      try {
        const ac = new (window.AudioContext||window.webkitAudioContext)();
        const src = ac.createMediaElementSource(audioRef.current);
        const an = ac.createAnalyser(); an.fftSize = 256;
        src.connect(an); an.connect(ac.destination);
        ctxRef.current = { ac, an, data: new Uint8Array(an.frequencyBinCount) };
      } catch(e) { ctxRef.current = null; }
    }
    if (!ctxRef.current) return;
    ctxRef.current.ac.resume();
    let raf, last = 0;
    const loop = (ts) => {
      if (ts - last > 70) {
        last = ts;
        const { an, data } = ctxRef.current;
        an.getByteFrequencyData(data);
        setBars(Array.from({length:64},(_,i)=>Math.max(5,(data[Math.floor(i*data.length/90)]/255)*100)));
      }
      raf = requestAnimationFrame(loop);
    };
    raf = requestAnimationFrame(loop);
    return () => cancelAnimationFrame(raf);
  }, [playing]);
  const toggle = () => { const a = audioRef.current; if (!a.paused) { a.pause(); } else { a.play().catch(()=>setPlaying(false)); } };
  const seek = (e) => { if (!dur || !isFinite(dur)) return; const r = e.currentTarget.getBoundingClientRect(); audioRef.current.currentTime = ((e.clientX-r.left)/r.width)*dur; };
  const fmt = (s) => (!isFinite(s) || isNaN(s)) ? '–:––' : `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
  const prog = (dur && isFinite(dur)) ? t/dur : 0;
  return (
    <section className="hz-section fade-in-2" id="exclusive">
      <div className="hz-player">
        <button className="hz-play-btn" onClick={toggle} aria-label={playing?'Pause':'Play'}>{playing ? '❚❚' : '▶'}</button>
        <div className="hz-player-main">
          <div className="hz-player-track">Likewise the Spirit Helps Us <span style={{color:'#e2007a'}}>(remix)</span></div>
          <div className="hz-player-sub">Hazzze · unreleased remix · nowhere else but here</div>
          <div className="hz-player-wave" onClick={seek}>
            {bars.map((h,i) => (
              <div key={i} className="pbar" style={{height:`${h}%`, background: i/64 <= prog ? '#e2007a' : `rgba(232,224,212,${0.08+h/400})`}}></div>
            ))}
          </div>
          <div className="hz-player-times"><span>{fmt(t)}</span><span>{fmt(dur)}</span></div>
        </div>
      </div>
      <audio ref={audioRef} src="assets/likewise-the-spirit-remix.mp3" preload="metadata"></audio>
    </section>
  );
}
