<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design — iamweswebb</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Syne:wght@700;800&family=JetBrains+Mono:wght@300;400;500&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: #080608; color: #e8e0d4; font-family: 'JetBrains Mono', monospace; overflow-x: hidden; }
  a { text-decoration: none; }
  nav {
    display: flex; justify-content: space-between; align-items: center;
    padding: 18px 52px; position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(8,6,8,0.82); backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(232,224,212,0.06);
  }
  .wm-lock { display: flex; align-items: center; gap: 12px; color: #e8e0d4; font-size: 13px; }
  nav ul { list-style: none; display: flex; gap: 26px; }
  nav ul li a { color: rgba(232,224,212,0.35); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; transition: color 0.15s; }
  nav ul li a:hover { color: #e2007a; }
  nav ul li a.here { color: #e8e0d4; }
  .hero {
    min-height: 88vh; display: flex; flex-direction: column; justify-content: flex-end;
    padding: 0 52px 56px; border-bottom: 1px solid rgba(232,224,212,0.08);
    position: relative; overflow: hidden;
    background-image: url('assets/img/0an2xr-missilemockup.jpg');
    background-size: cover; background-position: center 40%;
  }
  .hero::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(8,6,8,0.5) 0%, rgba(8,6,8,0.25) 45%, rgba(8,6,8,0.85) 100%);
  }
  .hero > * { position: relative; z-index: 2; }
  .hero h1 {
    font-family: 'Anton', sans-serif; font-weight: 400;
    font-size: clamp(56px, 8vw, 150px); line-height: 0.92; letter-spacing: 0.01em;
    text-transform: uppercase; color: #e8e0d4;
  }
  .hero h1 .accent { color: #e2007a; }
  .hero-meta {
    margin-top: 48px; display: flex; align-items: stretch;
    border-top: 1px solid rgba(232,224,212,0.08);
  }
  .hero-meta p { padding: 26px 48px 0 0; font-family: 'Lora', serif; font-size: 16px; line-height: 1.75; color: rgba(232,224,212,0.5); max-width: 520px; }
  .section { padding: 80px 52px; border-bottom: 1px solid rgba(232,224,212,0.06); }
  .section-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #e2007a; margin-bottom: 36px; }
  .tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 44px; }
  .tab-btn {
    padding: 10px 20px; border: 1px solid rgba(232,224,212,0.15); border-radius: 100px;
    background: none; color: rgba(232,224,212,0.45);
    font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.08em;
    text-transform: uppercase; cursor: pointer; transition: all 0.15s;
  }
  .tab-btn:hover { border-color: #e2007a; color: #e2007a; }
  .tab-btn.active { background: #e2007a; border-color: #e2007a; color: #fff; }
  .work-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
  .work-tile {
    position: relative; cursor: pointer; overflow: hidden;
    border: 1px solid rgba(232,224,212,0.08);
    aspect-ratio: 4/5; display: flex; flex-direction: column;
    justify-content: flex-end; padding: 22px;
    transition: border-color 0.22s; background: rgba(232,224,212,0.03);
  }
  .work-tile:hover { border-color: #e2007a; }
  .work-tile img {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; transition: transform 0.4s ease;
  }
  .work-tile:hover img { transform: scale(1.03); }
  .tile-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(8,6,8,0.82) 0%, rgba(8,6,8,0.1) 55%, transparent 100%); }
  .tile-meta { position: relative; z-index: 2; }
  .tile-cat { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(232,224,212,0.45); margin-bottom: 5px; }
  .tile-name { font-size: 19px; font-weight: 500; color: #f5f0e8; line-height: 1.2; font-family: 'Lora', serif; }
  .cta-strip { padding: 80px 52px; display: flex; justify-content: space-between; align-items: center; gap: 40px; border-bottom: 1px solid rgba(232,224,212,0.06); }
  .cta-strip h2 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(26px, 3vw, 48px); letter-spacing: -0.03em; line-height: 1.08; color: #e8e0d4; }
  .cta-strip h2 span { color: #e2007a; }
  .hz-btn {
    padding: 16px 36px; background: #e2007a; color: #fff;
    font-size: 12px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
    transition: opacity 0.2s; white-space: nowrap; border-radius: 2px;
    font-family: 'JetBrains Mono', monospace;
  }
  .hz-btn:hover { opacity: 0.82; }
  .hz-btn.outline { background: transparent; border: 1px solid rgba(232,224,212,0.18); color: rgba(232,224,212,0.6); }
  .hz-btn.outline:hover { border-color: #e2007a; color: #e2007a; opacity: 1; }
  footer {
    padding: 28px 52px; display: flex; justify-content: space-between; align-items: center;
    font-size: 10px; letter-spacing: 0.1em; color: rgba(232,224,212,0.25);
  }
  footer a { color: inherit; transition: color 0.15s; }
  footer a:hover { color: #e2007a; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  .fade-in { animation: fadeUp 0.6s ease both; }
  .lb-backdrop { position: fixed; inset: 0; z-index: 200; background: rgba(8,6,8,0.97); overflow-y: auto; animation: fadeUp 0.3s ease both; }
  .lb-inner { max-width: 880px; margin: 0 auto; padding: 90px 32px 120px; }
  .lb-close {
    position: fixed; top: 20px; right: 28px; z-index: 210;
    width: 48px; height: 48px; border-radius: 50%; border: 1px solid rgba(232,224,212,0.2);
    background: rgba(8,6,8,0.8); color: #e8e0d4; font-size: 20px; line-height: 1;
    cursor: pointer; font-family: 'JetBrains Mono', monospace; transition: all 0.15s;
  }
  .lb-close:hover { border-color: #e2007a; color: #e2007a; }
  .lb-cat { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #e2007a; margin-bottom: 14px; }
  .lb-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(32px, 4.5vw, 60px); line-height: 1.02; letter-spacing: -0.03em; color: #e8e0d4; margin-bottom: 30px; }
  .lb-text { font-family: 'Lora', serif; font-size: 16px; line-height: 1.75; color: rgba(232,224,212,0.62); margin-bottom: 18px; white-space: pre-line; }
  .lb-imgs { display: flex; flex-direction: column; gap: 14px; margin-top: 38px; }
  .lb-imgs img { width: 100%; display: block; border: 1px solid rgba(232,224,212,0.08); }

@media(max-width:760px){
  nav{flex-wrap:wrap;padding:14px 20px;gap:8px 16px}
  nav ul{order:3;width:100%;flex-wrap:wrap;gap:8px 18px}
  .hero{padding:0 20px 44px}
  .hero h1{font-size:clamp(36px,10.5vw,150px)}
  .hero-meta p{padding-right:0}
  .section{padding:56px 20px}
  .work-grid{grid-template-columns:repeat(2,1fr)}
  .cta-strip{flex-direction:column;align-items:flex-start;padding:56px 20px;gap:28px}
  .lb-inner{padding:80px 20px 90px}
  footer{flex-direction:column;align-items:flex-start;gap:8px;padding:24px 20px}
}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="wm-lock">
    <svg width="24" height="16" viewBox="0 0 240 160" xmlns="http://www.w3.org/2000/svg"><rect x="0" y="0" width="26" height="160" fill="#e8e0d4"></rect><rect x="42" y="75" width="26" height="85" fill="#e8e0d4"></rect><rect x="84" y="0" width="26" height="160" fill="#e8e0d4"></rect><rect x="126" y="0" width="26" height="160" fill="#e8e0d4"></rect><rect x="168" y="75" width="26" height="85" fill="#e8e0d4"></rect><rect x="210" y="0" width="26" height="160" fill="#e8e0d4"></rect></svg>
    iamweswebb
  </a>
  <ul>
    <li><a href="#" class="here">Design</a></li>

</nav>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const IMG = 'assets/img/';

// ── PROJECTS — slug opens the full case-study lightbox; img-only entries open a single-image lightbox ──
const PROJECTS = {
  graphic: [
    { name:"Lolly's Creamery",          cat:'Graphic Design', img: IMG+'8f7k57-lollyport.jpg',      slug:'lollys' },
    { name:'Champion Brewery',          cat:'Graphic Design', img: IMG+'frf424-championport.jpg',   slug:'champion' },
    { name:'UVA Arts',                  cat:'Graphic Design', img: IMG+'h78g5w-uvaport.jpg',        slug:'uva-arts' },
    { name:'Wine Labels',               cat:'Graphic Design', img: IMG+'njzc6s-variosbottlesport.jpg', slug:'wine-labels' },
    { name:'Boys & Girls Club',         cat:'Graphic Design', img: IMG+'qm7iah-bgcport.jpg',        slug:'boys-girls-club' },
    { name:'VA Film Festival',          cat:'Graphic Design', img: IMG+'fo8yhy-vaffport.jpg',       slug:'virginia-film-festival' },
    { name:'Blue Mountain Brewery',     cat:'Graphic Design', img: IMG+'6yzwij-bmbport2.jpg',       slug:'blue-mountain-brewery' },
    { name:'Out Here Magazine',         cat:'Graphic Design', img: IMG+'gwn46x-outhereport.jpg',    slug:'out-here-magazine' },
    { name:'Blue Mountain Barrel House',cat:'Graphic Design', img: IMG+'eu3pa2-bhport.jpg',         slug:'blue-mountain-barrel-house' },
    { name:'UVA Drama',                 cat:'Graphic Design', img: IMG+'gi2gwu-dramaport.jpg',      slug:'uva-drama' },
    { name:'James Harris Moore',        cat:'Graphic Design', img: IMG+'3k2omb-jhmport.jpg',        slug:'jamesharrismoore' },
  ],
  branding: [
    { name:"Lolly's Creamery",          cat:'Brand Identity', img: IMG+'y0kdpw-various-logos-06.jpg', slug:'lollys' },
    { name:'Champion Brewery',          cat:'Brand Identity', img: IMG+'temnte-various-logos-01.jpg', slug:'champion' },
    { name:'UVA Arts',                  cat:'Brand Identity', img: IMG+'1hikbd-uvaartsfinalbw-01-01.png', slug:'uva-arts' },
    { name:'Blue Mountain Brewery',     cat:'Brand Identity', img: IMG+'zjtr4l-bmblogobw-01.png',    slug:'blue-mountain-brewery' },
    { name:'Restaurant',                cat:'Brand Identity', img: IMG+'eblv3m-various-logos-02.jpg' },
    { name:'Fitness Coach',             cat:'Brand Identity', img: IMG+'6fra8n-various-logos-07.jpg' },
    { name:'Awards Ceremony',           cat:'Brand Identity', img: IMG+'mixqzw-various-logos-05.jpg' },
    { name:'Civic Identity',            cat:'Brand Identity', img: IMG+'ffat0g-newrochelle.jpg' },
    { name:'Media Company',             cat:'Brand Identity', img: IMG+'bmnohl-various-logos-08.jpg' },
    { name:'University Program',        cat:'Brand Identity', img: IMG+'mc275l-various-logos-04.jpg' },
    { name:'Real Estate Developer',     cat:'Brand Identity', img: IMG+'i7g89r-san-jose-west-logo-one-color-pro.jpg' },
    { name:'Winery',                    cat:'Brand Identity', img: IMG+'zqb73x-various-logos-03.jpg' },
  ],
  illustration: [
    { name:'James Harris Moore',        cat:'Illustration', img: IMG+'f5f4nz-jhmport.jpg',   slug:'jamesharrismoore' },
    { name:'Timothy Ryan Driscoll',     cat:'Illustration', img: IMG+'laoxjj-trdport.jpg',   slug:'timothy-ryan-driscoll' },
    { name:'VA Film Festival',          cat:'Illustration', img: IMG+'pnhkjm-vaffport.jpg',  slug:'virginia-film-festival' },
    { name:'Solar Poster Series',       cat:'Illustration', img: IMG+'pl6smm-solarport.jpg', slug:'poster-series' },
    { name:'Theo Chocolate',            cat:'Illustration', img: IMG+'02ks3w-theoport.png',  slug:'theo-chocolate' },
    { name:'Vanderbilt University',     cat:'Illustration', img: IMG+'891u10-vandyport.png', slug:'vanderbilt' },
  ],
};

const TABS = [
  { key:'all',          label:'All work' },
  { key:'graphic',      label:'Graphic Design' },
  { key:'branding',     label:'Branding' },
  { key:'illustration', label:'Illustration' },
];

function Lightbox({ project, onClose }) {
  useEffect(() => {
    const onKey = e => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    document.body.style.overflow = 'hidden';
    return () => { window.removeEventListener('keydown', onKey); document.body.style.overflow = ''; };
  }, []);
  const detail = project.slug ? window.PROJECT_DETAILS[project.slug] : null;
  return ReactDOM.createPortal(
    <div className="lb-backdrop" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <button className="lb-close" onClick={onClose} aria-label="Close">✕</button>
      <div className="lb-inner">
        <div className="lb-cat">{project.cat}</div>
        <div className="lb-title">{detail ? detail.title : project.name}</div>
        {detail && detail.text.map((t, i) => <p className="lb-text" key={i}>{t}</p>)}
        <div className="lb-imgs">
          {(detail ? detail.images : [project.img]).map((src, i) => <img src={src} key={i} loading="lazy" alt="" />)}
        </div>
      </div>
    </div>,
    document.body
  );
}

function App() {
  const [active, setActive] = useState('all');
  const [open, setOpen] = useState(null);
  const projects = active === 'all'
    ? [...PROJECTS.graphic, ...PROJECTS.branding, ...PROJECTS.illustration]
    : PROJECTS[active];
  return (
    <div className="fade-in">
      <section className="hero">
        <h1>Let's make<br/>something fun<br/><span className="accent">together</span></h1>
        <div className="hero-meta">
          <p>After two decades working with clients ranging from startups to universities, I know that good design is as much about listening as it is about making.</p>
        </div>
      </section>

      <section className="section">
        <div className="section-label">Selected work · 20+ years</div>
        <div className="tabs">
          {TABS.map(({key, label}) => (
            <button key={key} className={`tab-btn${active===key?' active':''}`} onClick={() => setActive(key)}>{label}</button>
          ))}
        </div>
        <div className="work-grid">
          {projects.map((p, i) => (
            <div key={p.name + p.cat + i} className="work-tile" onClick={() => setOpen(p)} role="button" tabIndex={0} onKeyDown={e => { if (e.key === 'Enter') setOpen(p); }}>
              <img src={p.img} alt={p.name} loading="lazy" />
              <div className="tile-overlay"></div>
              <div className="tile-meta">
                <div className="tile-cat">{p.cat}</div>
                <div className="tile-name">{p.name}</div>
              </div>
            </div>
          ))}
        </div>
      </section>

      <div className="cta-strip">
        <h2>Design is one part.<br/>There's also <span>sound</span><br/>and <span>sawdust.</span></h2>
        <div style={{display:'flex', gap:12, flexDirection:'column', alignItems:'flex-end', flexShrink:0}}>
          <a href="music.html" className="hz-btn">Hear the music →</a>
          <a href="sculpture.html" className="hz-btn outline">See the sculpture →</a>
        </div>
      </div>

      <footer>
        <span>© 2026 WES WEBB · IAMWESWEBB.COM</span>
        <span><a href="https://www.instagram.com/iamweswebb/" target="_blank" rel="noreferrer">INSTAGRAM</a> · <a href="mailto:iamweswebb@gmail.com">EMAIL</a> · NASHVILLE, TN</span>
      </footer>

      {open && <Lightbox project={open} onClose={() => setOpen(null)} />}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script src="assets/transition.js"></script>
</body>
</html>
