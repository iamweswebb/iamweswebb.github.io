<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ORBIT — ambient sample looper</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fdf6f8;--panel:#ffffff;--border:#f0e2ec;--text:#9c8ab4;--dim:#cfc0dc;--glow:#eda3cc;
  --s0:#ff96c2;--s1:#ffbe8a;--s2:#c2a4ff;--s3:#8fd8f4;--s4:#ffdf8f;--s5:#9ce8c0;
}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100dvh;display:flex;flex-direction:column;align-items:center;padding:18px 14px 46px;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");opacity:0.06;pointer-events:none;z-index:1000}
header,.section-label,.pads,#addSound,footer{position:relative;z-index:2}
header{width:100%;max-width:600px;display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.logo{font-family:'Share Tech Mono',monospace;font-size:1.6rem;letter-spacing:0.42em;color:var(--glow)}
.right{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.subtitle{font-size:0.6rem;letter-spacing:0.22em;color:var(--dim);text-transform:uppercase}
/* ── circle ── */
.stage{width:100%;max-width:760px;position:relative;display:grid;grid-template-columns:84px 1fr 84px;align-items:center;gap:4px}
.stage svg{width:100%;height:auto;display:block;touch-action:none;grid-column:2;grid-row:1}
#knobsL{grid-column:1;grid-row:1}
#knobsR{grid-column:3;grid-row:1}
.knob-col{display:flex;flex-direction:column;align-items:center;gap:14px;justify-self:center;position:relative;z-index:3}
.knob-col .col-title{font-family:'Share Tech Mono',monospace;font-size:0.52rem;letter-spacing:0.26em;color:var(--glow);opacity:0.85}
.knob{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:ns-resize;touch-action:none;-webkit-tap-highlight-color:transparent;user-select:none}
.knob-face{width:52px;height:52px;border-radius:50%;border:1px solid var(--border);background:rgba(255,255,255,0.4);position:relative;transition:border-color 0.2s;box-shadow:0 2px 8px rgba(58,20,64,0.08)}
.knob:hover .knob-face,.knob.drag .knob-face{border-color:var(--glow)}
.knob-ind{position:absolute;left:50%;top:4px;width:2px;height:14px;background:var(--glow);border-radius:1px;transform-origin:50% 22px;margin-left:-1px}
.knob-label{font-family:'Share Tech Mono',monospace;font-size:0.44rem;letter-spacing:0.16em;color:var(--dim)}
.knob-val{font-family:'Share Tech Mono',monospace;font-size:0.5rem;color:var(--text);min-height:1em}
@media(max-width:560px){.stage{grid-template-columns:64px 1fr 64px;gap:2px}.knob-face{width:44px;height:44px}.knob-ind{transform-origin:50% 18px;height:12px}}
/* ── corona: black core → purple → magenta → orange → warm white page ── */
.corona{position:absolute;left:50%;top:50%;width:150%;aspect-ratio:1/1;transform:translate(-50%,-50%);border-radius:50%;pointer-events:none;
  background:radial-gradient(circle,#8478c9 0%,#9a8ada 14%,#bda4ea 25%,#e0aae4 33%,#f7b8d9 40%,#ffcfb4 50%,#ffe4d4 62%,#fff5ec 74%,rgba(253,246,248,0) 84%);
  filter:blur(18px);opacity:1;
  animation:coronaBreathe 7s ease-in-out infinite,coronaHue 90s linear infinite;animation-play-state:paused,paused}
.corona::after{content:'';position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(circle,transparent 24%,rgba(160,130,235,0.14) 30%,rgba(250,160,210,0.12) 38%,rgba(255,200,160,0.09) 48%,transparent 62%);
  animation:coronaSpin 30s linear infinite paused;filter:blur(12px)}
body.playing .corona{animation-play-state:running,running}
body.playing .corona::after{animation-play-state:running}
@keyframes coronaBreathe{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.03)}}
@keyframes coronaSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes coronaHue{from{filter:blur(18px) hue-rotate(0deg)}to{filter:blur(18px) hue-rotate(360deg)}}
.ring{display:none}
#ringHit{fill:none;stroke:transparent;stroke-width:44;cursor:grab;pointer-events:stroke}
body.winding #ringHit{cursor:grabbing}
.tick{stroke:#7c6ba8;stroke-width:1;opacity:0.3}
.tick.mid{stroke:#7c6ba8;opacity:0.5}
.tick.major{stroke:#7c6ba8;stroke-width:1.8;opacity:0.7}
body.winding .tick{opacity:1}
.arc{fill:none;stroke-width:5;opacity:0.55;stroke-linecap:round;transition:opacity 0.3s;mix-blend-mode:screen}
.arc.live{opacity:1;filter:drop-shadow(0 0 8px currentColor)}
.playhead-tick{stroke:#fff;stroke-width:1.8;opacity:0.95}
.marker{cursor:grab}
.marker:active{cursor:grabbing}
.marker .hit{fill:transparent;r:26}
.marker .dot{stroke-width:2;fill:#9a8ada;transition:r 0.15s}
.marker text{font-family:'Share Tech Mono',monospace;font-size:11px;text-anchor:middle;dominant-baseline:central;pointer-events:none}
.marker.sel .dot{stroke-width:3}
.ripple{fill:none;stroke-width:2;opacity:0;pointer-events:none}
.stage-mid{position:relative;grid-column:2;grid-row:1}
.stage-mid svg{position:relative;z-index:1}
.center-ui{z-index:2}
.stage-mid svg{grid-column:unset;grid-row:unset}
.center-ui{position:absolute;left:50%;top:50%;width:0;height:0}
.center-ui .power{position:absolute;left:0;top:0;transform:translate(-50%,-50%)}
.center-ui .loop-len{position:absolute;left:0;top:52px;transform:translateX(-50%)}
.power{width:78px;height:78px;border-radius:50%;border:1px solid rgba(255,255,255,0.55);background:rgba(154,138,218,0.25);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.25s;-webkit-tap-highlight-color:transparent}
.power svg{stroke:rgba(255,255,255,0.85);stroke-width:2;fill:none;stroke-linecap:round;width:26px;height:26px;transition:stroke 0.25s}
.power:hover{border-color:#fff}
body.playing .power{border-color:#fff;box-shadow:0 0 22px rgba(255,255,255,0.25);animation:pulse 4s ease-in-out infinite}
body.playing .power svg{stroke:#fff}
@keyframes pulse{0%,100%{box-shadow:0 0 12px rgba(255,255,255,0.18)}50%{box-shadow:0 0 30px rgba(255,255,255,0.4)}}
.loop-len{font-family:'Share Tech Mono',monospace;font-size:0.72rem;letter-spacing:0.14em;color:rgba(255,255,255,0.75);background:none;border:1px solid transparent;border-radius:4px;padding:3px 8px;text-align:center;min-width:92px}
.loop-len:focus{outline:none;border-color:rgba(255,255,255,0.5);color:#fff}
.hint{position:absolute;left:50%;bottom:4%;transform:translateX(-50%);font-family:'Share Tech Mono',monospace;font-size:0.55rem;letter-spacing:0.18em;color:rgba(255,255,255,0.85);text-transform:uppercase;opacity:0.9;pointer-events:none;transition:opacity 0.5s;text-align:center;width:100%;z-index:2}
body.has-markers .hint{opacity:0}
/* ── pads ── */
.section-label{width:100%;max-width:600px;font-family:'Share Tech Mono',monospace;font-size:0.5rem;letter-spacing:0.25em;color:var(--dim);opacity:0.6;margin:14px 0 5px}
.pads{width:100%;max-width:600px;display:flex;flex-direction:column;gap:6px}
.pad{background:rgba(255,255,255,0.4);border:1px solid var(--border);border-radius:6px;padding:9px 12px;display:grid;grid-template-columns:auto 1fr auto;gap:4px 12px;align-items:center;transition:border-color 0.3s;--oc:var(--dim)}
.pad.loaded{--oc:var(--sc)}
.pad.hl{border-color:var(--oc)}
.pad-id{display:flex;align-items:center;gap:8px;min-width:104px}
.pad-swatch{width:9px;height:9px;border-radius:50%;background:var(--oc);flex-shrink:0;transition:background 0.3s}
.pad.loaded .pad-swatch{box-shadow:0 0 7px var(--oc)}
.pad-name{font-family:'Share Tech Mono',monospace;font-size:0.56rem;letter-spacing:0.06em;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:104px;cursor:pointer}
.pad-name.empty{color:var(--dim)}
.pad-name:hover{color:var(--oc)}
.pad-dur{font-family:'Share Tech Mono',monospace;font-size:0.48rem;color:var(--dim)}
.pad-ctrls{display:flex;align-items:center;gap:10px}
.pad-ctrls input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:28px;background:none;cursor:pointer}
.pad-ctrls input[type=range]::-webkit-slider-runnable-track{background:var(--border);height:2px;border-radius:1px}
.pad-ctrls input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--oc);margin-top:-5.5px;box-shadow:0 0 6px color-mix(in srgb,var(--oc) 50%,transparent)}
.pad-ctrls input[type=range]::-moz-range-track{background:var(--border);height:2px;border-radius:1px}
.pad-ctrls input[type=range]::-moz-range-thumb{width:13px;height:13px;border-radius:50%;background:var(--oc);border:none;box-shadow:0 0 6px color-mix(in srgb,var(--oc) 50%,transparent)}
.slab{font-family:'Share Tech Mono',monospace;font-size:0.44rem;letter-spacing:0.14em;color:var(--dim);width:26px;flex-shrink:0;white-space:nowrap}
.mute-btn{font-family:'Share Tech Mono',monospace;font-size:0.5rem;letter-spacing:0.1em;padding:6px 10px;border-radius:3px;border:1px solid var(--border);background:none;color:var(--dim);cursor:pointer;transition:all 0.15s;min-width:44px}
.mute-btn:hover{border-color:var(--oc);color:var(--text)}
.mute-btn.muted{color:var(--bg);background:var(--oc);border-color:var(--oc)}
/* ── fx ── */
.fx{width:100%;max-width:600px;display:grid;grid-template-columns:1fr 1fr;gap:6px}
.fx-group{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:11px 13px}
.fx-title{font-family:'Share Tech Mono',monospace;font-size:0.55rem;letter-spacing:0.24em;color:var(--glow);opacity:0.85;margin-bottom:7px}
.fx-row{display:flex;align-items:center;gap:10px}
.fx-row+.fx-row{margin-top:2px}
.fx-row .slab{width:44px}
.fx-row input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:28px;background:none;cursor:pointer}
.fx-row input[type=range]::-webkit-slider-runnable-track{background:var(--border);height:2px;border-radius:1px}
.fx-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--glow);margin-top:-5.5px;box-shadow:0 0 6px color-mix(in srgb,var(--glow) 50%,transparent)}
.fx-row input[type=range]::-moz-range-track{background:var(--border);height:2px;border-radius:1px}
.fx-row input[type=range]::-moz-range-thumb{width:13px;height:13px;border-radius:50%;background:var(--glow);border:none;box-shadow:0 0 6px color-mix(in srgb,var(--glow) 50%,transparent)}
.fx-val{font-family:'Share Tech Mono',monospace;font-size:0.48rem;color:var(--dim);min-width:34px;text-align:right}
footer{width:100%;max-width:600px;margin-top:14px;padding-top:9px;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-family:'Share Tech Mono',monospace;font-size:0.45rem;letter-spacing:0.2em;color:var(--dim);text-transform:uppercase}
footer a{color:var(--dim);text-decoration:none}
footer a:hover{color:var(--glow)}
body.dragover::after{content:'DROP AUDIO';position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:color-mix(in srgb,var(--bg) 82%,transparent);color:var(--glow);font-family:'Share Tech Mono',monospace;font-size:1.4rem;letter-spacing:0.5em;z-index:500;border:2px dashed var(--glow)}
@media(max-width:520px){.fx{grid-template-columns:1fr}.pad{grid-template-columns:auto 1fr;grid-template-rows:auto auto}.pad .mute-btn{grid-column:2;justify-self:end;grid-row:1}.pad-ctrls{grid-column:1/-1}}
</style>
</head>
<body data-theme="corona">
<header>
  <div class="logo">ORBIT</div>
  <div class="right">
    <div class="subtitle">Ambient sample looper</div>
  </div>
</header>

<div class="stage">
  <div class="knob-col" id="knobsL">
    <div class="col-title">REVERB</div>
  </div>
  <div class="stage-mid">
  <div class="corona"></div>
  <svg viewBox="0 0 500 500" id="loopSvg">
    <g id="ticks"></g>
    <circle cx="250" cy="250" r="192" class="ring"></circle>
    <circle id="ringHit" cx="250" cy="250" r="192"></circle>
    <g id="arcs"></g>
    <line id="playhead" class="playhead-tick" x1="0" y1="0" x2="0" y2="0" visibility="hidden"></line>
    <g id="ripples"></g>
    <g id="markers"></g>
  </svg>
  <div class="center-ui">
    <button class="power" id="playToggle" aria-label="Play / stop">
      <svg id="iconPlay" viewBox="0 0 24 24"><polygon points="7,4 19,12 7,20"></polygon></svg>
      <svg id="iconPause" viewBox="0 0 24 24" style="display:none"><line x1="8" y1="5" x2="8" y2="19"></line><line x1="16" y1="5" x2="16" y2="19"></line></svg>
    </button>
    <input class="loop-len" id="timeBadge" value="00:12:00" spellcheck="false">
  </div>
  </div>
  <div class="knob-col" id="knobsR">
    <div class="col-title">DELAY</div>
  </div>
  <div class="hint">Add a sound below &middot; drag markers to place them &middot; wind the ring to stretch the loop</div>
</div>

<div class="pads" id="pads"></div>
<button class="mute-btn" id="addSound" style="width:100%;max-width:600px;margin-top:6px;padding:10px">+ ADD SOUND</button>
<div style="display:none">
  <input id="reverbMix" type="range" min="0" max="1" step="0.01" value="0.45"><span id="reverbMixV"></span>
  <input id="reverbSize" type="range" min="0.3" max="10" step="0.1" value="4"><span id="reverbSizeV"></span>
  <input id="reverbBloom" type="range" min="0" max="1" step="0.01" value="0.4"><span id="reverbBloomV"></span>
  <input id="delayMix" type="range" min="0" max="1" step="0.01" value="0.25"><span id="delayMixV"></span>
  <input id="delayFb" type="range" min="0" max="0.95" step="0.01" value="0.45"><span id="delayFbV"></span>
  <input id="delayRatioRaw" type="range" min="0" max="4" step="1" value="1"><span id="delayRatioV"></span>
</div>

<footer>
  <span>ORBIT &middot; SAMPLE LOOPER</span>
  <span><a href="../experiments.html">IAMWESWEBB</a></span>
</footer>

<script src="orbit-engine.js"></script>
<script src="orbit-knobs.js"></script>
</body>
</html>
